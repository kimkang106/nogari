name: Notion 데이터 갱신 및 배포

on:
  # 매일 오전 6시 자동 실행 (한국시간 오후 3시)
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = KST 06:00

  # 수동 실행 (GitHub 웹에서 "Run workflow" 버튼)
  workflow_dispatch:

  # main 브랜치 push 시에도 실행
  push:
    branches: [ main ]

permissions:
  contents: write   # data.json 커밋용
  pages: write      # GitHub Pages 배포용
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: Notion 데이터 fetch → data.json 생성
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/fetch_notion.py

      - name: data.json 커밋 (변경된 경우에만)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: Notion 데이터 갱신 $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: GitHub Pages 배포
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Pages 배포 완료
        uses: actions/deploy-pages@v4
