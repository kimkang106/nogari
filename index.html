<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>nogari</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a2240;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #c8e4f0;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── 물고기 ── */
  .fish-wrap {
    position: relative;
    width: min(96vw, 1200px);
    filter: drop-shadow(0 0 60px oklch(0.55 0.22 200 / 0.45));
    transition: filter 0.5s;
    animation: fishFloat ease-in-out 5s infinite;
  }
  .fish-wrap:hover {
    filter: drop-shadow(0 0 90px oklch(0.65 0.25 195 / 0.55));
  }
  @keyframes fishFloat {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-10px); }
  }
  .fish-svg { width: 100%; height: auto; display: block; overflow: visible; }

  /* ── 비늘 호버 ── */
  .scale-group { cursor: pointer; }
  .scale-border {
    fill: none;
    stroke: oklch(0.55 0.18 195 / 0.55);
    stroke-width: 1.5;
    transition: stroke 0.2s, stroke-width 0.2s;
  }
  .scale-group:hover .scale-border {
    stroke: oklch(0.85 0.28 185);
    stroke-width: 2;
    filter: drop-shadow(0 0 8px oklch(0.7 0.25 185));
  }
  .scale-img { transition: filter 0.2s; }
  .scale-group:hover .scale-img { filter: brightness(1.35) saturate(1.2); }
  .scale-empty { pointer-events: none; }

  /* ── 오버레이 백드롭 ── */
  .backdrop {
    position: fixed;
    inset: 0;
    background: transparent;
    pointer-events: none;
    z-index: 90;
    transition: background 0.4s;
  }
  .backdrop.active {
    background: rgba(1, 5, 18, 0.72);
    pointer-events: all;
  }

  /* ── 오버레이 패널 ── */
  .overlay {
    position: fixed;
    right: 0; top: 0;
    height: 100%;
    width: min(420px, 100vw);
    background: linear-gradient(165deg, #040f24 0%, #020a1c 100%);
    border-left: 1px solid oklch(0.55 0.15 200 / 0.25);
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    z-index: 100;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .overlay.open { transform: translateX(0); }

  .overlay-img-wrap { position: relative; flex-shrink: 0; }
  .overlay-img {
    width: 100%;
    aspect-ratio: 4/3;
    object-fit: cover;
    display: block;
  }
  .overlay-img-placeholder {
    width: 100%;
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, oklch(0.18 0.14 218), oklch(0.12 0.09 210));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 56px;
  }

  .overlay-body {
    padding: 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .overlay-meta {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: oklch(0.62 0.15 195);
  }
  .overlay-title {
    font-size: 22px;
    font-weight: 600;
    color: #e8f4fb;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .overlay-desc {
    font-size: 14px;
    line-height: 1.7;
    color: oklch(0.68 0.06 210);
    flex: 1;
  }

  /* 오버레이 본문 리치 콘텐츠 */
  .overlay-desc p { margin-bottom: 10px; }
  .overlay-desc h2, .overlay-desc h3 { color: #e8f4fb; margin: 16px 0 8px; line-height: 1.4; }
  .overlay-desc h2 { font-size: 17px; }
  .overlay-desc h3 { font-size: 15px; }
  .overlay-desc ul, .overlay-desc ol { padding-left: 20px; margin-bottom: 10px; }
  .overlay-desc li { margin-bottom: 4px; }
  .overlay-desc blockquote { border-left: 2px solid oklch(0.55 0.18 195 / 0.5); padding-left: 12px; opacity: 0.8; margin: 10px 0; }
  .overlay-desc hr { border: none; border-top: 1px solid oklch(0.55 0.15 200 / 0.25); margin: 16px 0; }
  .overlay-desc img { max-width: 100%; border-radius: 4px; margin: 8px 0; display: block; }
  .overlay-desc input[type="checkbox"] { accent-color: oklch(0.55 0.22 200); margin-right: 5px; }

  .overlay-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border: 1px solid oklch(0.55 0.18 195 / 0.4);
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: oklch(0.75 0.18 188);
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    width: fit-content;
    margin-top: auto;
  }
  .overlay-link:hover {
    border-color: oklch(0.75 0.22 185);
    background: oklch(0.75 0.18 188 / 0.08);
  }

  .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    background: rgba(2,15,36,0.8);
    border: 1px solid oklch(0.5 0.12 200 / 0.4);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #a0c8e0;
    font-size: 16px;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  .close-btn:hover { background: rgba(5,30,60,0.9); color: #fff; }

  /* ── 버블 ── */
  .bubble {
    position: absolute;
    border-radius: 50%;
    border: 1px solid oklch(0.72 0.12 200 / 0.25);
    background: oklch(0.72 0.12 200 / 0.04);
    animation: floatBubble linear infinite;
    pointer-events: none;
  }
  @keyframes floatBubble {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    8%   { opacity: 0.7; }
    90%  { opacity: 0.25; }
    100% { transform: translateY(-110vh) translateX(var(--drift, 20px)); opacity: 0; }
  }

  /* ── 해초 ── */
  @keyframes sway {
    0%,100% { transform: rotate(-6deg); }
    50%     { transform: rotate(6deg); }
  }
  .seaweed-group { transform-origin: center bottom; animation: sway ease-in-out 4s infinite; }
  .seaweed-group:nth-child(2) { animation-duration: 3.5s; animation-delay: -1.2s; }
  .seaweed-group:nth-child(3) { animation-duration: 4.8s; animation-delay: -0.7s; }
  .seaweed-group:nth-child(4) { animation-duration: 3.8s; animation-delay: -2.1s; }

  /* ── UI 레이블 ── */
  .site-title {
    position: fixed;
    top: 24px; left: 32px;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: oklch(0.58 0.12 200);
    z-index: 10;
  }
  .scale-count {
    position: fixed;
    bottom: 24px; left: 32px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: oklch(0.42 0.1 200);
    z-index: 10;
  }
  .cms-badge {
    position: fixed;
    bottom: 24px; right: 32px;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: oklch(0.38 0.1 200);
    z-index: 10;
    text-transform: uppercase;
  }
  .cms-badge span { color: oklch(0.58 0.18 188); }

  /* ── 비늘 툴팁 ── */
  #scale-tooltip {
    position: fixed;
    background: rgba(4, 15, 36, 0.92);
    border: 1px solid oklch(0.55 0.15 200 / 0.25);
    border-radius: 4px;
    padding: 7px 11px;
    pointer-events: none;
    z-index: 50;
    display: none;
    max-width: 160px;
    transform: translate(-50%, calc(-100% - 10px));
    backdrop-filter: blur(6px);
  }
  #scale-tooltip .tip-title { font-size: 12px; color: #e8f4fb; font-weight: 500; line-height: 1.4; }
  #scale-tooltip .tip-tag {
    font-size: 11px;
    color: oklch(0.75 0.18 188);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── 설정 버튼 ── */
  #config-btn {
    position: fixed;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(4,15,36,0.6);
    border: 1px solid oklch(0.5 0.12 200 / 0.3);
    color: oklch(0.55 0.12 200);
    font-size: 15px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
    z-index: 10;
  }
  #config-btn:hover { background: rgba(5,30,60,0.9); color: #e8f4fb; }

  /* ── 설정 모달 ── */
  #config-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(1,5,18,0.8);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #config-modal.open { display: flex; }

  .modal-box {
    background: #040f24;
    border: 1px solid oklch(0.55 0.15 200 / 0.25);
    border-radius: 8px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
  }
  .modal-box h2 {
    font-size: 13px;
    font-weight: 600;
    color: #e8f4fb;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 11px;
    color: oklch(0.62 0.15 195);
    margin-bottom: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .field-group input {
    width: 100%;
    padding: 9px 12px;
    background: oklch(0.55 0.15 200 / 0.06);
    border: 1px solid oklch(0.55 0.15 200 / 0.2);
    border-radius: 4px;
    color: #e8f4fb;
    font-size: 13px;
    font-family: inherit;

    transition: border-color 0.2s;

  .field-group input:focus { border-color: oklch(0.55 0.22 200); }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn-primary {
    flex: 1; padding: 10px;
    background: oklch(0.40 0.20 205);
    border: none; border-radius: 4px;
    color: #e8f4fb; font-size: 11px;
    letter-spacing: 0.1em; text-transform: uppercase;
    font-family: inherit; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: oklch(0.50 0.22 200); }
  .btn-secondary {
    padding: 10px 16px;
    background: transparent;
    border: 1px solid oklch(0.55 0.15 200 / 0.3);
    border-radius: 4px;
    color: oklch(0.62 0.15 195);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: inherit; cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-secondary:hover { border-color: oklch(0.55 0.15 200 / 0.6); }
</style>

<script>
/* ══════════════════════════════════════
   물고기 기하 상수
══════════════════════════════════════ */
const BODY_POLY = [
  [148,250],[158,215],[178,180],[210,155],[252,136],
  [302,122],[360,114],[422,110],[484,109],[544,112],
  [598,120],[645,134],[683,154],[712,178],[730,205],
  [738,250],[730,295],[712,322],[683,346],[645,366],
  [598,380],[544,388],[484,391],[422,390],[360,386],
  [302,378],[252,364],[210,345],[178,320],[158,285],
];
const EYE_CX = 700, EYE_CY = 210, EYE_R = 30;
const SCALE_R = 21;
const COL_STEP = SCALE_R * 2 * 0.92;
const ROW_STEP = SCALE_R * Math.sqrt(3) * 0.90;
const NS = 'http://www.w3.org/2000/svg';

function pip(px, py, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j];
    if (((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi))
      inside = !inside;
  }
  return inside;
}

function generatePositions(maxCount) {
  const positions = [];
  for (let row = 0; positions.length < maxCount && row < 30; row++) {
    const offsetX = row % 2 === 0 ? 0 : COL_STEP / 2;
    const y = 120 + row * ROW_STEP;
    for (let col = 0; positions.length < maxCount && col < 30; col++) {
      const x = 162 + col * COL_STEP + offsetX;
      if (x > 835 || y > 395) continue;
      if (!pip(x, y, BODY_POLY)) continue;
      const dx = x - EYE_CX, dy = y - EYE_CY;
      if (Math.sqrt(dx * dx + dy * dy) < EYE_R + 20) continue;
      positions.push({ x, y });
    }
  }
  return positions;
}

/* ══════════════════════════════════════
   눈 애니메이션 (렘니스케이트 rAF)
══════════════════════════════════════ */
let eyeT = 0;
(function animateEye() {
  eyeT += 0.006;
  const px = EYE_CX + Math.sin(eyeT) * 6;
  const py = EYE_CY + Math.sin(eyeT * 2) * 3;
  const pupil = document.getElementById('eye-pupil');
  const hl    = document.getElementById('eye-highlight');
  if (pupil) { pupil.setAttribute('cx', px); pupil.setAttribute('cy', py); }
  if (hl)    { hl.setAttribute('cx', px - 4); hl.setAttribute('cy', py - 4); }
  requestAnimationFrame(animateEye);
})();

/* ══════════════════════════════════════
   버블 생성
══════════════════════════════════════ */
(function createBubbles() {
  const scene = document.querySelector('.scene');
  for (let i = 0; i < 22; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    const size  = 4 + Math.random() * 18;
    const drift = (Math.random() - 0.5) * 60;
    b.style.cssText = `left:${5 + Math.random() * 90}%;bottom:${Math.random() * 30}%;width:${size}px;height:${size}px;animation-duration:${7 + Math.random() * 12}s;animation-delay:${Math.random() * 14}s;--drift:${drift}px`;
    scene.appendChild(b);
  }
})();

/* ══════════════════════════════════════
   비늘 SVG 생성
══════════════════════════════════════ */
function buildScales(items) {
  window.currentItems = items;

  const g    = document.getElementById('scales-group');
  const defs = document.querySelector('#fish-svg defs');
  g.innerHTML = '';
  document.querySelectorAll('[id^="sc-clip-"]').forEach(el => el.remove());

  const allPositions = generatePositions(55);
  const count = Math.min(items.length, allPositions.length);

  // 콘텐츠 비늘
  for (let i = 0; i < count; i++) {
    const { x, y } = allPositions[i];
    const item = items[i];

    const clip = document.createElementNS(NS, 'clipPath');
    clip.setAttribute('id', `sc-clip-${i}`);
    clip.setAttribute('clipPathUnits', 'userSpaceOnUse');
    const ce = document.createElementNS(NS, 'circle');
    ce.setAttribute('cx', x); ce.setAttribute('cy', y); ce.setAttribute('r', SCALE_R - 1);
    clip.appendChild(ce);
    defs.appendChild(clip);

    const sg = document.createElementNS(NS, 'g');
    sg.setAttribute('class', 'scale-group');

    const titleEl = document.createElementNS(NS, 'title');
    titleEl.textContent = item.title || '제목 없음';
    sg.appendChild(titleEl);

    const bg = document.createElementNS(NS, 'circle');
    bg.setAttribute('cx', x); bg.setAttribute('cy', y); bg.setAttribute('r', SCALE_R);
    bg.setAttribute('fill', 'oklch(0.12 0.1 215)');
    sg.appendChild(bg);

    if (item.coverImage) {
      const img = document.createElementNS(NS, 'image');
      img.setAttribute('class', 'scale-img');
      img.setAttribute('href', item.coverImage);
      img.setAttribute('x', x - SCALE_R + 1); img.setAttribute('y', y - SCALE_R + 1);
      img.setAttribute('width', (SCALE_R - 1) * 2); img.setAttribute('height', (SCALE_R - 1) * 2);
      img.setAttribute('clip-path', `url(#sc-clip-${i})`);
      img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
      img.addEventListener('error', () => {
        img.remove();
        const txt = document.createElementNS(NS, 'text');
        txt.setAttribute('x', x); txt.setAttribute('y', y + 5);
        txt.setAttribute('text-anchor', 'middle');
        txt.setAttribute('font-size', '14');
        txt.setAttribute('fill', 'oklch(0.62 0.15 195)');
        txt.setAttribute('clip-path', `url(#sc-clip-${i})`);
        txt.textContent = item.emoji || '📄';
        sg.appendChild(txt);
      });
      sg.appendChild(img);
    } else {
      const txt = document.createElementNS(NS, 'text');
      txt.setAttribute('x', x); txt.setAttribute('y', y + 5);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '14');
      txt.setAttribute('fill', 'oklch(0.62 0.15 195)');
      txt.setAttribute('clip-path', `url(#sc-clip-${i})`);
      txt.textContent = item.emoji || '📄';
      sg.appendChild(txt);
    }

    // 테두리
    const border = document.createElementNS(NS, 'circle');
    border.setAttribute('class', 'scale-border');
    border.setAttribute('cx', x); border.setAttribute('cy', y); border.setAttribute('r', SCALE_R - 0.5);
    sg.appendChild(border);

    // 비늘 하이라이트 arc
    const arc = document.createElementNS(NS, 'path');
    arc.setAttribute('d', `M ${x - SCALE_R * 0.8} ${y + SCALE_R * 0.1} A ${SCALE_R * 0.9} ${SCALE_R * 0.9} 0 0 1 ${x + SCALE_R * 0.8} ${y + SCALE_R * 0.1}`);
    arc.setAttribute('fill', 'none');
    arc.setAttribute('stroke', 'oklch(0.75 0.15 200 / 0.12)');
    arc.setAttribute('stroke-width', '1');
    sg.appendChild(arc);

    sg.addEventListener('mouseenter', (e) => showTooltip(e, item));
    sg.addEventListener('mousemove',  moveTooltip);
    sg.addEventListener('mouseleave', hideTooltip);
    sg.addEventListener('click', () => openOverlay(item));
    g.appendChild(sg);
  }

  // 장식용 빈 비늘
  for (let i = count; i < allPositions.length; i++) {
    const { x, y } = allPositions[i];
    const sg = document.createElementNS(NS, 'g');
    sg.setAttribute('class', 'scale-empty');

    const bg = document.createElementNS(NS, 'circle');
    bg.setAttribute('cx', x); bg.setAttribute('cy', y); bg.setAttribute('r', SCALE_R);
    bg.setAttribute('fill', 'oklch(0.12 0.1 215)');
    bg.setAttribute('opacity', '0.4');
    sg.appendChild(bg);

    const border = document.createElementNS(NS, 'circle');
    border.setAttribute('cx', x); border.setAttribute('cy', y); border.setAttribute('r', SCALE_R - 0.5);
    border.setAttribute('fill', 'none');
    border.setAttribute('stroke', 'oklch(0.55 0.18 195 / 0.2)');
    border.setAttribute('stroke-width', '1');
    sg.appendChild(border);

    const arc = document.createElementNS(NS, 'path');
    arc.setAttribute('d', `M ${x - SCALE_R * 0.8} ${y + SCALE_R * 0.1} A ${SCALE_R * 0.9} ${SCALE_R * 0.9} 0 0 1 ${x + SCALE_R * 0.8} ${y + SCALE_R * 0.1}`);
    arc.setAttribute('fill', 'none');
    arc.setAttribute('stroke', 'oklch(0.75 0.15 200 / 0.06)');
    arc.setAttribute('stroke-width', '1');
    sg.appendChild(arc);

    g.appendChild(sg);
  }

  document.getElementById('scale-count').textContent =
    count > 0 ? `${count} images` : '0 images';
}

/* ══════════════════════════════════════
   오버레이 열기/닫기
══════════════════════════════════════ */
function openOverlay(item, updateHash = true) {
  if (updateHash) location.hash = '#' + item.id;

  // 커버 이미지
  const wrap = document.getElementById('overlay-img-wrap');
  const prev = wrap.querySelector('img, .overlay-img-placeholder');
  if (prev) prev.remove();

  if (item.coverImage) {
    const img = document.createElement('img');
    img.className = 'overlay-img';
    img.src = item.coverImage;
    img.alt = item.title || '';
    img.onerror = () => {
      img.remove();
      const ph = document.createElement('div');
      ph.className = 'overlay-img-placeholder';
      ph.textContent = item.emoji || '📄';
      wrap.insertBefore(ph, wrap.querySelector('.close-btn'));
    };
    wrap.insertBefore(img, wrap.querySelector('.close-btn'));
  } else {
    const ph = document.createElement('div');
    ph.className = 'overlay-img-placeholder';
    ph.textContent = item.emoji || '📄';
    wrap.insertBefore(ph, wrap.querySelector('.close-btn'));
  }

  // 메타
  const metaParts = [];
  if (item.date) metaParts.push(item.date);
  if (item.tag)  metaParts.push(item.tag);
  document.getElementById('overlay-meta').textContent = metaParts.join(' · ');

  // 제목
  document.getElementById('overlay-title').textContent = item.title || '제목 없음';

  // 본문
  const desc = document.getElementById('overlay-desc');
  if (item.content) {
    desc.innerHTML = item.content;
  } else {
    desc.innerHTML = (item.description || '')
      .split('\n')
      .filter(l => l.trim())
      .map(l => `<p>${l}</p>`)
      .join('') || '<p style="opacity:0.4">내용이 없습니다.</p>';
  }

  // 원문 링크
  const link = document.getElementById('overlay-link');
  if (item.notionUrl) {
    link.href = item.notionUrl;
    link.style.display = 'inline-flex';
  } else {
    link.style.display = 'none';
  }

  document.getElementById('overlay').classList.add('open');
  document.getElementById('backdrop').classList.add('active');
}

function closeOverlay() {
  location.hash = '';
}

function _doCloseOverlay() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('backdrop').classList.remove('active');
}

/* ══════════════════════════════════════
   URL 해시 라우팅
══════════════════════════════════════ */
function handleHash() {
  const id = location.hash.slice(1);
  if (id && window.currentItems) {
    const item = window.currentItems.find(i => i.id === id);
    if (item) { openOverlay(item, false); return; }
  }
  _doCloseOverlay();
}

/* ══════════════════════════════════════
   비늘 툴팁
══════════════════════════════════════ */
function showTooltip(e, item) {
  const tip = document.getElementById('scale-tooltip');
  tip.querySelector('.tip-title').textContent = item.title || '';
  tip.querySelector('.tip-tag').textContent   = item.tag   || '';
  tip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  const tip = document.getElementById('scale-tooltip');
  tip.style.left = e.clientX + 'px';
  tip.style.top  = e.clientY + 'px';
}
function hideTooltip() {
  document.getElementById('scale-tooltip').style.display = 'none';
}

/* ══════════════════════════════════════
   설정 관리
══════════════════════════════════════ */
function loadConfig() {
  return {
    title:    localStorage.getItem('fish_title')    || 'nogari',
    subtitle: localStorage.getItem('fish_subtitle') || '',
  };
}
function openConfig() {
  const c = loadConfig();
  document.getElementById('input-title').value    = c.title;
  document.getElementById('input-subtitle').value = c.subtitle;
  document.getElementById('config-modal').classList.add('open');
}
function closeConfig() {
  document.getElementById('config-modal').classList.remove('open');
}
function saveConfig() {
  const title = document.getElementById('input-title').value.trim() || 'nogari';
  localStorage.setItem('fish_title',    title);
  localStorage.setItem('fish_subtitle', document.getElementById('input-subtitle').value.trim());
  document.getElementById('site-title').textContent = title;
  closeConfig();
  fetchNotionData();
}

/* ══════════════════════════════════════
   Notion 데이터 로딩
══════════════════════════════════════ */
async function fetchNotionData() {
  document.getElementById('scale-count').textContent = 'loading...';
  try {
    const base = location.href.replace(/\/[^\/]*$/, '').replace(/\/$/, '');
    const res  = await fetch(base + '/data.json?t=' + Date.now());
    if (!res.ok) throw new Error('data.json not found');
    const data  = await res.json();
    const items = data.items || [];
    buildScales(items.length > 0 ? items : []);
    if (items.length === 0) document.getElementById('scale-count').textContent = '0 images';
    handleHash();
  } catch (err) {
    console.error(err);
    buildScales(DEMO_DATA);
    document.getElementById('scale-count').textContent = `${DEMO_DATA.length} images (demo)`;
    handleHash();
  }
}
